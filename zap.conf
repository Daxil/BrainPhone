# ZAP baseline scan configuration
# Format: IGNORE/WARN/FAIL per rule ID
#
# IGNORE = suppress entirely (known false positive)
# WARN   = report but don't fail CI
# FAIL   = fail CI on this finding (default for Medium+)

# Cookie without SameSite — handled in Express (sameSite: 'strict')
IGNORE 10054

# Missing Anti-CSRF tokens — SPA uses session cookies + Origin check
IGNORE 10202

# X-Frame-Options — we use CSP frame-ancestors: none (equivalent)
IGNORE 10020

# Application Error Disclosure — dev mode error messages in stack traces
WARN 90022

# Cookie No HttpOnly Flag — our sid cookie is httpOnly
IGNORE 10010
