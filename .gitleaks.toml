# gitleaks config for BrainPhone (client + server monorepo).
# Full ruleset (useDefault) + a tight allowlist for KNOWN non-secrets only.
# CI (platform-ci secret-scan.yml, full-history) fails on anything NOT allowlisted here,
# so keep this list minimal and specific — never broaden it to silence a real finding.

title = "BrainPhone secret-scan"

[extend]
useDefault = true

[allowlist]
description = "Known non-secrets (audited 2026-07-14)"

# Commit e64eebe8 ("V2.0") added two LOCAL DEV secrets, both since removed from the tree
# (git rm --cached) and git-ignored (server/.gitignore, client/.gitignore):
#   - client/keys.json : a Yandex Cloud service-account key NOT referenced by any code,
#                        infra, or the Docker build/deploy. The production SA key is a
#                        different one (confirmed) → not compromised in prod, not rotated.
#   - server/.env:10   : TOTP_ENCRYPTION_KEY, a dev-only value (DB_HOST=localhost,
#                        NODE_ENV=development). Prod injects its own key generated by
#                        Terraform (random_id.audio_tool_totp) via Lockbox, so this value
#                        never reaches production → not rotated. DB creds are localhost dev.
# Scoped to THIS commit SHA only (not by path), so a NEW secret in a future .env / keys.json —
# or anywhere else — is still caught. Never widen to a path/filename allowlist for secrets.
commits = [
  "e64eebe8f973358db4088e696a3bfabff5959223",
]

# server/src/services/pwned.service.ts holds a STATIC list of the most common passwords
# (COMMON_PASSWORDS) for the password-strength checker; the HIBP breach check uses keyless
# k-anonymity range queries, so this file never holds a real credential. generic-api-key
# matches high-entropy list entries like '1234567890ab'. Allowlist the path so future edits
# to the wordlist don't trip CI (the commit allowlist above only covers today's history).
paths = [
  '''server/src/services/pwned\.service\.ts''',
]
