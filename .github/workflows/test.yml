name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    # Inline gitleaks: this repo lives outside the BrainPhoneLLC org, so it can't call the
    # centralized platform-ci reusable workflow (private, org-scoped). Mirrors that workflow
    # (secret-scan.yml@v0.6.0): pinned gitleaks 8.30.1, full-history scan, uses ./.gitleaks.toml,
    # fails on any finding not allowlisted there.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so past commits are scannable

      - name: Install gitleaks
        env:
          VERSION: "8.30.1"
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o "$tmp/gitleaks.tar.gz"
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
          echo "$tmp" >> "$GITHUB_PATH"
          "$tmp/gitleaks" version

      - name: Run gitleaks
        run: |
          gitleaks detect --source . --config .gitleaks.toml \
            --redact --no-banner \
            --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://placeholder/placeholder
          TOTP_ENCRYPTION_KEY: ${{ secrets.TOTP_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
        run: npm run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/test_db
          TOTP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NODE_ENV: test
        run: npx ts-node src/scripts/migrate.ts

      - name: Run integration tests
        working-directory: server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/test_db
          REDIS_URL: redis://localhost:6380
          TOTP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: npm run test:integration -- --forceExit

  security-scan:
    name: ZAP Security Scan
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: brainphone
          POSTGRES_PASSWORD: brainphone
          POSTGRES_DB: brainphone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install and build
        run: |
          cd server && npm ci && npm run build

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://brainphone:brainphone@localhost:5432/brainphone
          TOTP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NODE_ENV: production
        run: npx ts-node src/scripts/migrate.ts

      - name: Start server
        working-directory: server
        env:
          DATABASE_URL: postgresql://brainphone:brainphone@localhost:5432/brainphone
          TOTP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NODE_ENV: production
          PORT: 3001
        run: node dist/app.js >> /tmp/server.log 2>&1 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in 30s — logs:"
          cat /tmp/server.log
          exit 1

      - name: Run ZAP baseline scan
        run: |
          mkdir -p zap-report
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-report:/zap/wrk/:rw \
            -v ${{ github.workspace }}/zap.conf:/zap/zap.conf:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:3001 \
              -r zap-report.html \
              -J zap-report.json \
              -l WARN \
              -c /zap/zap.conf \
            || echo "ZAP_EXIT=$?" >> $GITHUB_ENV

      - name: Check for Medium+ findings
        run: |
          if [ -n "${ZAP_EXIT:-}" ] && [ "$ZAP_EXIT" -ge 3 ]; then
            echo "ZAP scan failed (exit $ZAP_EXIT) – report was not generated, skipping findings check."
            exit 0
          fi
          python3 - zap-report/zap-report.json <<'EOF'
          import sys, json, os
          path = sys.argv[1]
          if not os.path.exists(path):
              print(f"ZAP report not found at {path} – scan did not complete, skipping.")
              sys.exit(0)
          with open(path) as f:
              data = json.load(f)
          alerts = data.get('site', [{}])[0].get('alerts', [])
          risk_map = {'High': 3, 'Medium': 2, 'Low': 1, 'Informational': 0}
          bad = [a for a in alerts if risk_map.get(a.get('riskdesc','').split()[0], 0) >= 2]
          if bad:
              for a in bad:
                  print(f"[{a.get('riskdesc')}] {a.get('name')}")
              sys.exit(2)
          print("No Medium+ findings.")
          EOF

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap-report/
